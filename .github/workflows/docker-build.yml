name: Docker Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths-ignore:
      - "templates/**"
      - "unraid/**"
      - "docker-compose*.yml"
      - "docker-compose*.yaml"
  pull_request:
    paths-ignore:
      - "templates/**"
      - "unraid/**"
      - "docker-compose*.yml"
      - "docker-compose*.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether to push image
        id: push_policy
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && ("${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == "refs/heads/master" || "${GITHUB_REF}" == refs/tags/v*) ]]; then
            echo "push_image=true" >> "$GITHUB_OUTPUT"
          else
            echo "push_image=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate DockerHub variables before pushing
        if: steps.push_policy.outputs.push_image == 'true'
        shell: bash
        run: |
          if [ -z "${{ vars.DOCKERHUB_USERNAME }}" ]; then
            echo "Missing required Actions variable: DOCKERHUB_USERNAME" >&2
            exit 1
          fi
          if [ -z "${{ vars.DOCKERHUB_REPOSITORY }}" ]; then
            echo "Missing required Actions variable: DOCKERHUB_REPOSITORY" >&2
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Missing required Actions secret: DOCKERHUB_TOKEN" >&2
            exit 1
          fi

      - name: Log in to DockerHub
        if: steps.push_policy.outputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ steps.push_policy.outputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
